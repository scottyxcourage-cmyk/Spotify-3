<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="BeatDrop Official — Stream music, discover trending artists, albums & playlists. Powered by Spotify."/>
  <meta name="theme-color" content="#0d0d12"/>
  <title>BeatDrop Official</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

  <!-- ── Page Loader ── -->
  <div id="page-loader" class="page-loader">
    <div class="loader-inner">
      <div class="loader-logo-wrap">
        <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg" width="64" height="64">
          <circle cx="28" cy="28" r="26" fill="url(#loaderGrad)"/>
          <path d="M21 17v22l18-11z" fill="#fff"/>
          <defs>
            <linearGradient id="loaderGrad" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
              <stop stop-color="#8b5cf6"/>
              <stop offset="1" stop-color="#ff2ec4"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="loader-pulse"></div>
      </div>
      <div class="loader-brand">BeatDrop</div>
      <div class="loader-sub">OFFICIAL</div>
      <div class="loader-bar"><div class="loader-bar-fill"></div></div>
    </div>
  </div>

  <!-- ── App Shell ── -->
  <div class="app-shell" id="app-shell">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-mark">
            <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" width="32" height="32">
              <circle cx="18" cy="18" r="17" fill="url(#brandGrad)"/>
              <path d="M14 11v14l11-7z" fill="#fff"/>
              <defs>
                <linearGradient id="brandGrad" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#8b5cf6"/>
                  <stop offset="1" stop-color="#ff2ec4"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div class="brand-text">
            <span class="brand-name">BeatDrop</span>
            <span class="brand-sub">OFFICIAL</span>
          </div>
        </div>
        <button class="sidebar-close" id="sidebar-close-btn" aria-label="Close sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="18" height="18"><path d="M6 6l12 12M18 6 6 18"/></svg>
        </button>
      </div>

      <!-- Search in sidebar (mobile) -->
      <div class="sidebar-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="15" height="15"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
        <input type="search" id="sidebar-search-input" placeholder="Search music…" autocomplete="off"/>
      </div>

      <nav id="sidebar-nav" class="sidebar-nav"></nav>

      <div class="sidebar-footer">
        <div class="spotify-badge">
          <svg viewBox="0 0 24 24" fill="#FF0092" width="16" height="16"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.6 0 12 0zm4.8 17.6c-.2.3-.6.4-1 .2-2.6-1.6-5.9-2-9.8-1.1-.4.1-.7-.2-.8-.5-.1-.4.2-.7.5-.8 4.2-.9 7.9-.5 10.8 1.2.4.2.5.7.3 1zm1.3-3c-.3.4-.8.5-1.2.3-3-1.8-7.5-2.4-11-1.3-.4.1-.9-.1-1-.5s.1-.9.5-1c4-.1 8.9.5 12.3 1.5.5.1.7.6.4 1zm.1-3.1c-3.6-2.1-9.5-2.3-12.9-1.3-.5.1-1-.2-1.1-.7-.2-.5.2-1 .7-1.1 4-1.1 10.3-.9 14.3 1.5.5.3.6.9.3 1.4-.3.4-.9.5-1.3.2z"/></svg>
          <span>Powered by Deezer</span>
        </div>
      </div>
    </aside>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main Column -->
    <div class="main-col" id="main-col">

      <!-- Topbar -->
      <header class="topbar" id="topbar" role="banner">
        <button class="hamburger-btn icon-btn" id="hamburger-btn" aria-label="Toggle sidebar" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="22" height="22"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>

        <div class="topbar-search-wrap" id="topbar-search-wrap">
          <div class="search-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
          </div>
          <input class="search-input" id="search-input" type="search" placeholder="Search songs, artists, albums…" autocomplete="off" spellcheck="false" aria-label="Search music"/>
          <kbd class="search-kbd">⌘K</kbd>
          <div class="search-results" id="search-results" role="listbox" aria-label="Search results"></div>
        </div>

        <div class="topbar-right">
          <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme" title="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" width="20" height="20"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1.08-1.52 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1.08 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
          <div class="api-status" id="api-status" title="API Status">
            <span class="status-dot"></span>
          </div>
          <div id="topbar-auth-slot"></div>
        </div>
      </header>

      <!-- Page Content -->
      <main id="page-content" role="main" tabindex="-1"></main>
    </div>
  </div>

  <!-- ── Music Player ── -->
  <div class="player-bar" id="player-bar" role="region" aria-label="Music player"></div>

  <!-- ── Toast ── -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>


  <!-- ── Auth Modal ── -->
  <div class="auth-modal-overlay hidden" id="auth-overlay">
    <div class="auth-modal" id="auth-modal">
      <button class="auth-close" id="auth-close-btn" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="18" height="18"><path d="M6 6l12 12M18 6 6 18"/></svg>
      </button>

      <!-- Step 1: Email -->
      <div id="auth-step-email">
        <div style="text-align:center;margin-bottom:20px">
          <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg" width="48" height="48" style="display:inline-block">
            <circle cx="28" cy="28" r="26" fill="url(#authGrad)"/>
            <path d="M21 17v22l18-11z" fill="#fff"/>
            <defs>
              <linearGradient id="authGrad" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
                <stop stop-color="#8b5cf6"/><stop offset="1" stop-color="#ff2ec4"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="auth-modal-title">Welcome to BeatDrop</div>
        <div class="auth-modal-sub">Sign in with your email to save favorites &amp; history</div>
        <label class="auth-label" for="auth-email-input">Email address</label>
        <input class="auth-input" id="auth-email-input" type="email" placeholder="you@example.com" autocomplete="email" spellcheck="false"/>
        <button class="auth-btn google-btn" id="auth-google-btn">
          <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
        <div class="auth-divider"><span>or</span></div>
        <button class="auth-btn" id="auth-send-btn">Continue with Email</button>
        <div class="auth-error" id="auth-email-error"></div>
      </div>

      <!-- Step 2: OTP -->
      <div id="auth-step-otp" style="display:none">
        <div style="text-align:center;margin-bottom:20px">
          <svg viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="1.6" width="40" height="40"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
        </div>
        <div class="auth-modal-title">Check your inbox</div>
        <div class="auth-modal-sub" id="auth-otp-sub">We sent a 6-digit code to your email</div>
        <label class="auth-label" for="auth-otp-input">6-digit code</label>
        <input class="auth-input otp-input" id="auth-otp-input" type="text" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="one-time-code"/>
        <button class="auth-btn" id="auth-verify-btn">Verify &amp; Sign In</button>
        <div class="auth-error" id="auth-otp-error"></div>
        <div class="auth-switch">Didn't get it? <button id="auth-resend-btn">Resend code</button></div>
      </div>
    </div>
  </div>

  <!-- ── Scripts ── -->
  <script src="/js/data.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
